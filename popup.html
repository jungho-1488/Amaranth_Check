<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>출퇴근 체크</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      width: 380px;
      background: #f0f2f5;
      color: #1a1a2e;
      font-size: 13px;
      padding-bottom: 8px;
    }

    /* ── 헤더 ──────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: #fff;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.35); }

    /* ── 공통 카드 ─────────────────────── */
    .card {
      background: #fff;
      border-radius: 10px;
      margin: 5px 8px 0;
      padding: 7px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card:last-child { margin-bottom: 0; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── 오늘 카드 ─────────────────────── */
    .today-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .today-date {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-holiday  { background: #fce4ec; color: #c62828; }
    .badge-leave    { background: #e3f2fd; color: #1565c0; }
    .badge-halfleave{ background: #e8f5e9; color: #2e7d32; }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-top: 4px;
    }
    .time-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 4px 4px;
      text-align: center;
    }
    .time-box .label {
      font-size: 10px;
      color: #999;
      margin-bottom: 2px;
    }
    .time-box .value {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .time-box.working .value { color: #1a73e8; }
    .time-box .value.muted   { color: #bbb; font-size: 13px; }
    .today-no-record {
      color: #bbb;
      text-align: center;
      padding: 6px 0;
      font-size: 13px;
    }

    /* ── 주간 카드 ─────────────────────── */
    .weekly-summary {
      font-size: 14px;
      font-weight: 700;
      color: #1a73e8;
      text-transform: none;
    }
    .progress-track {
      background: #e8eaf6;
      border-radius: 6px;
      height: 5px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #1a73e8, #26a69a);
      transition: width 0.4s ease;
    }
    .progress-fill.over { background: linear-gradient(90deg, #43a047, #00897b); }
    .progress-fill.warn { background: linear-gradient(90deg, #fb8c00, #e53935); }

    .day-list { display: flex; flex-direction: column; gap: 2px; }
    .day-row {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 7px;
      gap: 6px;
      font-size: 12px;
    }
    .day-row.today-row-item { background: #e8f0fe; }
    .day-row.holiday        { background: #fff8f8; }
    .day-row.leave          { background: #f0f7ff; }
    .day-row.halfleave      { background: #f0fff4; }
    .day-row.future         { opacity: 0.45; }

    .day-name {
      width: 16px;
      font-weight: 700;
      color: #555;
      flex-shrink: 0;
    }
    .day-name.sat { color: #1565c0; }
    .day-name.sun { color: #c62828; }
    .day-times {
      flex: 1;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-times .em { color: #1a73e8; font-weight: 500; }
    .day-hours {
      font-weight: 700;
      font-size: 12px;
      color: #333;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-variant-numeric: tabular-nums;
    }
    .dur-num { display: inline-block; min-width: 2ch; text-align: right; }
    .day-hours.h-holiday   { color: #e53935; }
    .day-hours.h-leave     { color: #1565c0; }
    .day-hours.h-halfleave { color: #2e7d32; }
    .day-hours.h-worked    { color: #37474f; }

    /* ── 금요일 예상 퇴근 카드 ────────── */
    .fri-summary {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    .fri-summary .em { font-weight: 700; color: #1a73e8; }
    .fri-summary .sep { color: #ccc; margin: 0 4px; }

    .fri-calc {
      border-top: 1px solid #f0f0f0;
      padding-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .fri-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .fri-row .label { font-size: 12px; color: #666; }
    .fri-time-input {
      width: 80px;
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 700;
      color: #333;
      background: #fafafa;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
    }
    .fri-time-input:focus { border-color: #1a73e8; background: #fff; }
    .fri-basis { font-size: 10px; color: #aaa; font-weight: 400; margin-left: 4px; }
    .fri-result {
      font-size: 18px;
      font-weight: 700;
      color: #1a73e8;
    }
    .fri-note { font-size: 10px; text-align: right; }
    .fri-done { text-align:center; padding:6px 0; color:#43a047; font-weight:700; font-size:14px; }
    .fri-done-sub { text-align:center; font-size:11px; color:#888; margin-top:2px; }

    /* ── 빠른 휴가 추가 ────────────────── */
    .title-right { display: flex; align-items: center; gap: 8px; }
    .btn-leave-quick {
      padding: 3px 9px;
      background: #e8f0fe;
      color: #1a73e8;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }
    .btn-leave-quick:hover { background: #c5d8fd; }
    .quick-leave-form {
      display: none;
      gap: 6px;
      margin-bottom: 8px;
    }
    .quick-leave-form input[type="date"],
    .quick-leave-form select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 12px;
      color: #333;
      background: #fafafa;
      outline: none;
    }
    .quick-leave-form input:focus,
    .quick-leave-form select:focus { border-color: #1a73e8; }
    .ql-btn {
      padding: 6px 12px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .ql-btn:hover { background: #1558b0; }
    .ql-msg { font-size: 11px; margin-bottom: 2px; }
    .ql-msg.ok  { color: #43a047; }
    .ql-msg.err { color: #e53935; }


    /* ── 날짜 행 수정 폼 ──────────────── */
    .day-row.editing { background: #e8f0fe !important; }
    .edit-panel {
      background: #f8f9ff;
      border: 1px solid #c5d8fd;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 2px 0 4px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .edit-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .edit-label {
      font-size: 11px;
      color: #666;
      width: 28px;
      flex-shrink: 0;
    }
    .edit-time-input {
      flex: 1;
      padding: 4px 7px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #333;
      background: #fff;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
    }
    .edit-time-input:focus { border-color: #1a73e8; }
    .edit-actions { display: flex; gap: 6px; }
    .edit-btn-save {
      flex: 1;
      padding: 5px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .edit-btn-save:hover { background: #1558b0; }
    .edit-btn-cancel {
      flex: 1;
      padding: 5px;
      background: #f1f3f4;
      color: #444;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .edit-msg { font-size: 11px; color: #e53935; min-height: 14px; }

    /* ── 로딩 / 오류 ───────────────────── */
    .loading {
      text-align: center;
      padding: 24px 0;
      color: #888;
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ddd;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 10px 12px;
      color: #c62828;
      font-size: 12px;
      line-height: 1.5;
    }
    .btn-retry {
      margin-top: 8px;
      padding: 5px 12px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <span class="header-title">Amaranth 출퇴근 체크</span>
    <div class="header-actions">
      <button class="icon-btn" id="btn-refresh" title="새로고침">&#8635;</button>
      <button class="icon-btn" id="btn-settings" title="설정">&#9881;</button>
      <button class="icon-btn" id="btn-close" title="닫기">&#10005;</button>
    </div>
  </div>

  <!-- 오늘 -->
  <div class="card" id="today-card">
    <div class="section-title">오늘</div>
    <div id="today-body"><div class="loading"><span class="spinner"></span>불러오는 중...</div></div>
  </div>

  <!-- 주간 -->
  <div class="card" id="weekly-card">
    <div class="section-title">
      이번 주 누적
      <div class="title-right">
        <button class="btn-leave-quick" id="btn-leave-quick">+ 휴가</button>
        <span class="weekly-summary" id="weekly-summary">–</span>
      </div>
    </div>
    <!-- 빠른 휴가 추가 인라인 폼 -->
    <div id="quick-leave-form" class="quick-leave-form">
      <input type="date" id="ql-date" />
      <select id="ql-type">
        <option value="연차">연차 (8h)</option>
        <option value="반차">반차 (4h)</option>
      </select>
      <button class="ql-btn" id="ql-submit">추가</button>
    </div>
    <div class="ql-msg" id="ql-msg"></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="day-list" id="day-list"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- 금요일 예상 퇴근 -->
  <div class="card" id="friday-card">
    <div class="section-title">
      금요일 예상 퇴근
      <span style="font-weight:400;font-size:10px;color:#aaa;letter-spacing:0;text-transform:none">주 40h 기준</span>
    </div>
    <div id="friday-body"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
